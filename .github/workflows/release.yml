name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.1.0)"
        required: true
        type: string
      prerelease:
        description: "Mark as pre-release"
        required: false
        type: boolean
        default: false

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  BINARY_NAME: valsb

jobs:
  build:
    strategy:
      matrix:
        include:
          # Linux
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            arch: amd64
            platform: linux
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            arch: arm64
            platform: linux

          # macOS
          - target: aarch64-apple-darwin
            os: macos-latest
            arch: arm64
            platform: darwin
          - target: x86_64-apple-darwin
            os: macos-latest
            arch: amd64
            platform: darwin

          # Windows
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            arch: amd64
            platform: windows

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools (Linux arm64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Configure linker (Linux arm64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          mkdir -p .cargo
          cat >> .cargo/config.toml <<EOF
          [target.aarch64-unknown-linux-gnu]
          linker = "aarch64-linux-gnu-gcc"
          EOF

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Run tests
        if: matrix.arch == 'amd64' && matrix.platform != 'windows'
        run: cargo test --release --target ${{ matrix.target }}

      - name: Run tests (Windows)
        if: matrix.platform == 'windows'
        run: cargo test --release --target ${{ matrix.target }}

      - name: Package release archive (Unix)
        if: matrix.platform != 'windows'
        run: |
          ARCHIVE_NAME="${BINARY_NAME}-${{ inputs.tag }}-${{ matrix.platform }}-${{ matrix.arch }}"
          mkdir -p "${ARCHIVE_NAME}"
          cp "target/${{ matrix.target }}/release/${BINARY_NAME}" "${ARCHIVE_NAME}/"
          cp README.md LICENSE* "${ARCHIVE_NAME}/" 2>/dev/null || true
          tar czf "${ARCHIVE_NAME}.tar.gz" "${ARCHIVE_NAME}"
          sha256sum "${ARCHIVE_NAME}.tar.gz" > "${ARCHIVE_NAME}.tar.gz.sha256"
          echo "ARCHIVE=${ARCHIVE_NAME}.tar.gz" >> "$GITHUB_ENV"
          echo "CHECKSUM=${ARCHIVE_NAME}.tar.gz.sha256" >> "$GITHUB_ENV"

      - name: Package release archive (Windows)
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          $archiveName = "${{ env.BINARY_NAME }}-${{ inputs.tag }}-${{ matrix.platform }}-${{ matrix.arch }}"
          New-Item -ItemType Directory -Path $archiveName -Force
          Copy-Item "target/${{ matrix.target }}/release/${{ env.BINARY_NAME }}.exe" "$archiveName/"
          Copy-Item "README.md" "$archiveName/" -ErrorAction SilentlyContinue
          Get-ChildItem "LICENSE*" | Copy-Item -Destination "$archiveName/" -ErrorAction SilentlyContinue
          Compress-Archive -Path "$archiveName/*" -DestinationPath "$archiveName.zip"
          $hash = (Get-FileHash "$archiveName.zip" -Algorithm SHA256).Hash.ToLower()
          "$hash  $archiveName.zip" | Out-File -Encoding ASCII "$archiveName.zip.sha256"
          echo "ARCHIVE=$archiveName.zip" >> $env:GITHUB_ENV
          echo "CHECKSUM=$archiveName.zip.sha256" >> $env:GITHUB_ENV

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: release-${{ matrix.platform }}-${{ matrix.arch }}
          path: |
            ${{ env.ARCHIVE }}
            ${{ env.CHECKSUM }}

  publish:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -lhR artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ inputs.tag }}
          name: ${{ inputs.tag }}
          prerelease: ${{ inputs.prerelease }}
          generate_release_notes: true
          files: |
            artifacts/*.tar.gz
            artifacts/*.zip
            artifacts/*.sha256
